<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Adventure Game - Noah's Ark</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; position: fixed; background: #000; 
            display: flex; justify-content: center; align-items: center;
            font-family: "Microsoft JhengHei", sans-serif;
        }
        canvas { 
            border: 1px solid #333; background: #000; touch-action: none; 
            max-width: 100%; max-height: 100%; object-fit: contain;
        }
        /* --- 引導按鈕樣式 --- */
        #line-guide {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            z-index: 10000; flex-direction: column; justify-content: center; align-items: center;
        }
        .start-btn {
            padding: 15px 30px; font-size: 20px; background: #4CAF50;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px rgba(76,175,80,0.5);
        }
        /* --- 旋轉提示 --- */
        #orientation-tip {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; z-index: 9999; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        @media screen and (orientation: portrait) { #orientation-tip { display: flex; } }
    </style>
</head>
<body>

    <div id="line-guide">
        <button class="start-btn" onclick="goToExternal()">⛴️ 點擊啟動「方舟」</button>
        <p style="color: #888; margin-top: 15px; font-size: 14px;">( 將自動開啟外部瀏覽器以獲得最佳體驗 )</p>
    </div>

    <div id="orientation-tip">
        <div style="font-size: 60px;">🔄</div>
        <p>請橫放手機以獲得最佳體驗</p>
    </div>

    <canvas id="game" width="800" height="450"></canvas>
    <video id="floodVideo" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); z-index:100;" preload="auto" playsinline> 
        <source src="assets/videos/flood.mp4" type="video/mp4">
    </video>

<script>
    // 偵測是否為 LINE
    const isLine = navigator.userAgent.indexOf('Line') > -1;
    const hasParam = window.location.href.indexOf('openExternalBrowser=1') > -1;

    if (isLine && !hasParam) {
        document.getElementById('line-guide').style.display = 'flex';
    }

    function goToExternal() {
        let url = window.location.href;
        url += (url.indexOf('?') > -1 ? '&' : '?') + 'openExternalBrowser=1';
        window.location.href = url;
    }

    const unlocker = () => {
        const el = document.documentElement;
        const rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
        if (rfs) rfs.call(el).catch(e => {});

        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        if (window.AudioContext) {
            const context = new AudioContext();
            if (context.state === 'suspended') context.resume();
        }
        document.removeEventListener('mousedown', unlocker);
        document.removeEventListener('touchstart', unlocker);
    };

    document.addEventListener('mousedown', unlocker);
    document.addEventListener('touchstart', unlocker);
</script>

    <script src="data_items.js"></script>
    <script src="scene_cassandra.js"></script>
    <script src="scene_after.js"></script>
    <script src="scene_jack.js"></script>
    <script src="scene_noah.js"></script>
    <script src="scene_mine.js"></script>
    <script src="scene_pasture.js"></script>
    <script src="scene_river.js"></script>
    <script src="scene_castle.js"></script>
    <script src="scene_bar.js"></script> 
    <script src="scene_forest.js"></script>
    <script src="scene_npcs.js"></script>
    <script src="scene_past_river.js"></script>
    <script src="scene_past_forest.js"></script>
    <script src="scene_past_castle.js"></script>
    <script src="scene_past_pasture.js"></script>
    <script src="scene_past_gate.js"></script>
    <script src="main_engine.js"></script>
</body>
</html>

<script>
    // --- 防誤觸重新整理 / 離開警告 ---
    // 放在最外面，只要頁面載入就生效
    window.onbeforeunload = function() {
        return "遊戲進度尚未儲存，確定要離開嗎？";
    };

    const unlocker = () => {
        // 1. 嘗試進入全螢幕
        const el = document.documentElement;
        const rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
        if (rfs) {
            rfs.call(el).catch(e => console.log("全螢幕請求被擋"));
        }

        // 2. 解鎖 AudioContext
        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        if (window.AudioContext) {
            const context = new AudioContext();
            if (context.state === 'suspended') {
                context.resume().then(() => {
                    console.log("音訊引擎已恢復");
                });
            }
        }
        
        console.log("方舟門禁已解鎖");
        
        document.removeEventListener('mousedown', unlocker);
        document.removeEventListener('touchstart', unlocker);
    };

    document.addEventListener('mousedown', unlocker);
    document.addEventListener('touchstart', unlocker);
</script>

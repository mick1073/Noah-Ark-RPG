<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Adventure Game - Noah's Ark</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; position: fixed; background: #000; 
            display: flex; justify-content: center; align-items: center;
            font-family: "Microsoft JhengHei", sans-serif;
        }
        canvas { 
            border: 1px solid #333; background: #000; touch-action: none; 
            max-width: 100%; max-height: 100%; object-fit: contain;
        }
        
        /* --- 1. 引導按鈕層 (最高級別) --- */
        #line-guide {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #000;
            z-index: 10001; /* 確保在最最最上面 */
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        .start-btn {
            padding: 20px 40px; font-size: 22px; background: #4CAF50;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px rgba(76,175,80,0.5); font-weight: bold;
        }

        /* --- 2. 旋轉提示層 (次高級別) --- */
        #orientation-tip {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; z-index: 9999; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        /* 只有當啟動層隱藏時，才允許顯示旋轉提示 (關鍵修正) */
        @media screen and (orientation: portrait) { 
            body:not(.in-app) #orientation-tip { display: flex; } 
        }
    </style>
</head>
<body class=""> <div id="line-guide">
        <button class="start-btn" onclick="goToExternal()">⛴️ 點擊啟動「方舟」</button>
        <p style="color: #aaa; margin-top: 20px; font-size: 15px; line-height: 1.6;">
            偵測到您在 App 內開啟<br>
            請點擊按鈕跳轉至瀏覽器以正常遊玩
        </p>
    </div>

    <div id="orientation-tip">
        <div style="font-size: 60px; margin-bottom: 20px;">🔄</div>
        <p>請橫放手機以獲得最佳體驗</p>
    </div>

    <canvas id="game" width="800" height="450"></canvas>
    
    <video id="floodVideo" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); z-index:100;" preload="auto" playsinline> 
        <source src="assets/videos/flood.mp4" type="video/mp4">
    </video>

<script>
    const ua = navigator.userAgent;
    const isLine = ua.indexOf('Line') > -1;
    const isFb = ua.indexOf('FBAN') > -1 || ua.indexOf('FBAV') > -1 || ua.indexOf('Messenger') > -1 || ua.indexOf('FB_IAB') > -1;
    const hasParam = window.location.href.indexOf('openExternalBrowser=1') > -1;

    // --- 邏輯判斷 ---
    if ((isLine || isFb) && !hasParam) {
        // 在 App 內：顯示按鈕，並標記 class 暫時停用旋轉提示
        document.body.classList.add('in-app');
        document.getElementById('line-guide').style.display = 'flex';
        
        if (isFb) {
            const btn = document.querySelector('.start-btn');
            btn.innerHTML = "⛴️ 啟動「方舟」";
        }
    }

    function goToExternal() {
        if (isFb) {
            alert("【臉書開啟提示】\n\n請點擊右上角「...」選單\n選擇「在瀏覽器中開啟」\n\n這樣遊戲才會有聲音且能全螢幕喔！");
        } else {
            let url = window.location.href;
            url += (url.indexOf('?') > -1 ? '&' : '?') + 'openExternalBrowser=1';
            window.location.href = url;
        }
    }

    const unlocker = () => {
        const el = document.documentElement;
        const rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
        if (rfs) rfs.call(el).catch(e => {});

        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        if (window.AudioContext) {
            const context = new AudioContext();
            if (context.state === 'suspended') context.resume();
        }
        document.removeEventListener('mousedown', unlocker);
        document.removeEventListener('touchstart', unlocker);
    };

    document.addEventListener('mousedown', unlocker);
    document.addEventListener('touchstart', unlocker);
</script>

    <script src="data_items.js"></script>
    <script src="scene_cassandra.js"></script>
    <script src="scene_after.js"></script>
    <script src="scene_jack.js"></script>
    <script src="scene_noah.js"></script>
    <script src="scene_mine.js"></script>
    <script src="scene_pasture.js"></script>
    <script src="scene_river.js"></script>
    <script src="scene_castle.js"></script>
    <script src="scene_bar.js"></script> 
    <script src="scene_forest.js"></script>
    <script src="scene_npcs.js"></script>
    <script src="scene_past_river.js"></script>
    <script src="scene_past_forest.js"></script>
    <script src="scene_past_castle.js"></script>
    <script src="scene_past_pasture.js"></script>
    <script src="scene_past_gate.js"></script>
    <script src="main_engine.js"></script>
</body>
</html>

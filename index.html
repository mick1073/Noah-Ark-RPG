<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Adventure Game - Noah's Ark</title>
    <style>
        /* 2. 徹底鎖定背景，防止手機網頁被拖動或產生回彈效果 */
        body, html { 
            margin: 0; 
            padding: 0;
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            position: fixed; /* 關鍵：防止手機瀏覽器上下滑動 */
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        canvas { 
            border: 1px solid #333; 
            background: #000; 
            touch-action: none; /* 禁用所有瀏覽器手勢，完全由 JS 控制 */
            
            /* 3. 讓遊戲畫面向下相容並保持橫向比例 */
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain;

            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 影片也同步保持全螢幕比例 */
        #floodVideo {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="450"></canvas>
    
    <video id="floodVideo" 
           style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); z-index:100;"
           preload="auto"
           playsinline> <source src="assets/videos/flood.mp4" type="video/mp4">
    </video>

  <script>
    // 建立一個「一次性」的解鎖器
    const unlocker = () => {
        // 1. 強行進入全螢幕
        const el = document.documentElement;
        const rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
        if (rfs) rfs.call(el).catch(e => {});

        // 2. 解鎖 AudioContext (解決紅字關鍵)
        if (window.AudioContext || window.webkitAudioContext) {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            if (context.state === 'suspended') context.resume();
        }

        // 3. 影片與音樂預熱：播一個 0.1 秒的無聲動作
        const video = document.getElementById('floodVideo');
        if (video) { video.play().then(() => video.pause()).catch(e => {}); }
        
        console.log("方舟門禁已解鎖");
        
        // 移除監聽，避免重複執行
        document.removeEventListener('mousedown', unlocker);
        document.removeEventListener('touchstart', unlocker);
    };

    // 使用最原始的事件，權限等級最高
    document.addEventListener('mousedown', unlocker);
    document.addEventListener('touchstart', unlocker);
</script>

    <script src="data_items.js"></script>
    <script src="scene_cassandra.js"></script>
    <script src="scene_after.js"></script>
    <script src="scene_jack.js"></script>
    <script src="scene_noah.js"></script>
    <script src="scene_mine.js"></script>
    <script src="scene_pasture.js"></script>
    <script src="scene_river.js"></script>
    <script src="scene_castle.js"></script>
    <script src="scene_bar.js"></script> 
    <script src="scene_forest.js"></script>
    <script src="scene_npcs.js"></script>
    <script src="scene_past_river.js"></script>
    <script src="scene_past_forest.js"></script>
    <script src="scene_past_castle.js"></script>
    <script src="scene_past_pasture.js"></script>
    <script src="scene_past_gate.js"></script>
    <script src="main_engine.js"></script>
</body>
</html>
